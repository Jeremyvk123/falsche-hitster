<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Falsche Hitster – Blind</title>

<style>
/* ===== BASIS ===== */
body {
  margin: 0;
  min-height: 100vh;
  background: #050507;
  color: #fff;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  width: 360px;
  background: #0f0f14;
  border-radius: 18px;
  padding: 18px;
  box-shadow: 0 20px 60px rgba(0,0,0,.6);
}

/* ===== HEADER ===== */
.code {
  font-size: 12px;
  opacity: .7;
  margin-bottom: 6px;
}

h1 {
  font-size: 18px;
  margin: 0 0 14px 0;
}

/* ===== CONTROLS ===== */
.controls {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
}

button {
  flex: 1;
  padding: 12px;
  border-radius: 14px;
  border: none;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
}

.play {
  background: #22c55e;
  color: #06210f;
}

.pause {
  background: #1f2937;
  color: #e5e7eb;
}

/* ===== PLAYER WRAPPER (BELANGRIJK) ===== */
.player-wrapper {
  position: relative;
  width: 100%;
  height: 152px;           /* ✅ vaste hoogte */
  border-radius: 14px;
  overflow: hidden;
  background: #000;
}

/* Spotify iframe – totaal onleesbaar */
.player-wrapper iframe {
  width: 100%;
  height: 100%;
  border: none;
  filter: blur(40px) brightness(0.08);
  transform: scale(1.4);
  pointer-events: none;
}

/* Blind overlay – ALLEEN over de player */
.player-wrapper::after {
  content: "🚫 Je mag niet spieken";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.96);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  letter-spacing: .4px;
  z-index: 5;
  pointer-events: none;
}
</style>
</head>

<body>
<div class="card">
  <div class="code">Code: <span id="code">—</span></div>
  <h1>Blind afspelen</h1>

  <!-- ✅ PLAY / PAUSE (NIET GEBLIND) -->
  <div class="controls">
    <button class="play" onclick="play()">▶ Play</button>
    <button class="pause" onclick="pause()">⏸ Pause</button>
  </div>

  <!-- ✅ ALLEEN DE PLAYER IS BLIND -->
  <div class="player-wrapper">
    <iframe
      id="player"
      allow="encrypted-media"
      loading="lazy">
    </iframe>
  </div>
</div>

<script>
/* CODE LEZEN */
const params = new URLSearchParams(location.search);
const t = params.get("t");
document.getElementById("code").textContent = t || "—";

const iframe = document.getElementById("player");

/* TRACK LADEN */
fetch("./tracks.json", { cache: "no-store" })
  .then(r => r.json())
  .then(tracks => {
    if (!t || !tracks[t]) return;
    const trackId = tracks[t].spotify_url.split("/track/")[1];
    iframe.src = "https://open.spotify.com/embed/track/" + trackId;
  });

/* PLAY / PAUSE */
function play() {
  iframe.contentWindow.postMessage(
    { command: "play" },
    "https://open.spotify.com"
  );
}

function pause() {
  iframe.contentWindow.postMessage(
    { command: "pause" },
    "https://open.spotify.com"
  );
}
</script>
</body>
</html>
