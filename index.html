<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Falsche Hitster</title>

<style>
body{
  margin:0;
  background:#0b0b0f;
  color:#fff;
  font-family:system-ui,Segoe UI,Roboto,Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.card{
  width:360px;
  background:#12121a;
  border-radius:16px;
  padding:16px;
}
iframe{
  width:100%;
  height:152px;
  border:none;
  border-radius:12px;
}
.blind::after{
  content:"Blind mode actief";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.85);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:14px;
  pointer-events:none;
}

}
.blind::after{
  content:"Blind mode actief";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.85);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:14px;
  pointer-events:none;
}
.code{
  font-size:12px;
  opacity:.7;
  margin-bottom:8px;
}
</style>
</head>

<body>
<div class="card">
  <div class="code">Code: <span id="code"></span></div>
  <div class="blind">
    <iframe id="player"
      allow="encrypted-media"
      loading="lazy">
    </iframe>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const t = params.get('t');
document.getElementById('code').textContent = t || '—';

fetch('./tracks.json',{cache:'no-store'})
  .then(r=>r.json())
  .then(tracks=>{
    const item = tracks[t];
    if(!item) return;
    const id = item.spotify_url.split('/track/')[1];
    document.getElementById('player').src =
      'https://open.spotify.com/embed/track/' + id;
  });
</script>
</body>
</html>
