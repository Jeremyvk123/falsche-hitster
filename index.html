<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Luister</title>
  <style>
    :root{--bg:#0b0b0f;--card:#12121a;--fg:#f3f4f6;--muted:#a1a1aa;--accent:#22c55e;}
    body{margin:0;background:radial-gradient(1200px 800px at 20% 0%, #163024, var(--bg));color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .wrap{width:min(820px, calc(100% - 32px));}
    .card{background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.10);border-radius:18px;padding:22px;box-shadow:0 18px 45px rgba(0,0,0,.45);}
    h1{font-size:20px;margin:0 0 6px 0;letter-spacing:.2px;}
    p{margin:0;color:var(--muted);line-height:1.35;}
    .row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-top:18px;}
    button,a.btn{appearance:none;border:none;border-radius:14px;padding:12px 16px;font-weight:600;cursor:pointer;display:inline-flex;gap:10px;align-items:center;text-decoration:none;}
    button.primary{background:var(--accent);color:#06210f;}
    button.secondary,a.btn.secondary{background:rgba(255,255,255,.10);color:var(--fg);}
    .pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.10);color:var(--muted);font-size:12px;}
    .status{margin-top:14px;font-size:14px;color:var(--muted);}
    .meter{height:10px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;border:1px solid rgba(255,255,255,.10);margin-top:10px;}
    .bar{height:100%;width:0%;background:linear-gradient(90deg, #22c55e, #34d399);}
    audio{width:100%;margin-top:16px;filter:invert(1) hue-rotate(180deg) saturate(1.2);}
    .tiny{font-size:12px;color:var(--muted);margin-top:10px;}
    .hidden{display:none;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="pill" id="codePill">Code: <strong id="codeLabel">—</strong></div>
      <h1>Luister (blind)</h1>
      <p>Deze pagina toont geen titel/artist. Druk op <strong>Play</strong> om het fragment af te spelen.</p>

      <div class="row">
        <button class="primary" id="playBtn">▶ Play</button>
        <button class="secondary" id="pauseBtn">⏸ Pauze</button>
        <a class="btn secondary" id="openSpotifyBtn" href="#" target="_blank" rel="noopener">Open in Spotify</a>
      </div>

      <div class="status" id="status">Laden…</div>
      <div class="meter"><div class="bar" id="bar"></div></div>

      <audio id="player" class="hidden" controls preload="none"></audio>
      <div class="tiny">Tip: sommige browsers blokkeren autoplay. Tik 1x op Play.</div>
    </div>
  </div>

<script>
(async function(){
  const params = new URLSearchParams(location.search);
  let t = params.get('t');
  if(!t && location.hash){
    const h = new URLSearchParams(location.hash.replace(/^#/, ''));
    t = h.get('t');
  }
  t = (t||'').trim();
  document.getElementById('codeLabel').textContent = t || '—';

  const statusEl = document.getElementById('status');
  const barEl = document.getElementById('bar');
  const audio = document.getElementById('player');
  const playBtn = document.getElementById('playBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const openSpotifyBtn = document.getElementById('openSpotifyBtn');

  const setStatus = (m)=> statusEl.textContent = m;

  if(!t){
    setStatus('Geen code gevonden in de URL. Gebruik bijv. ?t=001');
    playBtn.disabled = true;
    pauseBtn.disabled = true;
    openSpotifyBtn.classList.add('hidden');
    return;
  }

  let map;
  try{
    const r = await fetch('./tracks.json', {cache:'no-store'});
    map = await r.json();
  }catch(e){
    setStatus('tracks.json kan niet geladen worden. Controleer hosting.');
    playBtn.disabled = true;
    pauseBtn.disabled = true;
    return;
  }

  const item = map[t];
  if(!item){
    setStatus('Code niet bekend (t=' + t + ').');
    playBtn.disabled = true;
    pauseBtn.disabled = true;
    return;
  }

  openSpotifyBtn.href = item.spotify_url || '#';
  if(!item.spotify_url) openSpotifyBtn.classList.add('hidden');

  if(!item.preview_url){
    setStatus('Geen preview beschikbaar. Gebruik “Open in Spotify”.');
    playBtn.disabled = true;
    pauseBtn.disabled = true;
    return;
  }

  audio.src = item.preview_url;
  audio.classList.remove('hidden');
  setStatus('Klaar om te spelen.');

  playBtn.addEventListener('click', async ()=>{
    try{ await audio.play(); setStatus('Afspelen…'); }
    catch(e){ setStatus('Afspelen geblokkeerd. Tik nogmaals op Play.'); }
  });
  pauseBtn.addEventListener('click', ()=>{ audio.pause(); setStatus('Gepauzeerd.'); });

  audio.addEventListener('timeupdate', ()=>{
    if(audio.duration){
      const p = Math.max(0, Math.min(1, audio.currentTime / audio.duration));
      barEl.style.width = (p*100).toFixed(1) + '%';
    }
  });
  audio.addEventListener('ended', ()=> setStatus('Klaar.'));
})();
</script>
</body>
</html>
